<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maths Keyword Matcher</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#ffffff; --bg2:#f5f5f4; --bg3:#eeece9;
      --text:#1a1a18; --text2:#5a5a56; --text3:#9a9a94;
      --border:#e2e0da; --border2:#cccac4;
      --green-bg:#eaf3de; --green-bd:#c0dd97; --green-tx:#27500a;
      --amber-bg:#faeeda; --amber-bd:#fac775; --amber-tx:#633806;
      --blue-bg:#e6f1fb; --blue-tx:#185fa5;
      --success-bg:#e2efda; --success-tx:#375623;
      --danger-bg:#fce4d6; --danger-tx:#c55a11;
      --info-bg:#deeaf1; --info-tx:#1f4e79;
      --radius:10px; --radius-sm:7px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#1c1c1a; --bg2:#242422; --bg3:#2c2c2a;
        --text:#f0ede8; --text2:#a8a8a0; --text3:#686864;
        --border:#38382e; --border2:#4a4a40;
        --green-bg:#1a3a08; --green-bd:#3b6d11; --green-tx:#c0dd97;
        --amber-bg:#2a1800; --amber-bd:#854f0b; --amber-tx:#fac775;
        --blue-bg:#042c53; --blue-tx:#85b7eb;
        --success-bg:#1a3a08; --success-tx:#c0dd97;
        --danger-bg:#3a1a08; --danger-tx:#f09559;
        --info-bg:#042c53; --info-tx:#85b7eb;
      }
    }
    html { font-size: 16px; }
    body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg3); color:var(--text); min-height:100vh; padding:2rem 1rem 4rem; }
    .container { max-width:820px; margin:0 auto; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:12px; }
    .brand { display:flex; align-items:center; gap:10px; }
    .brand-icon { width:36px; height:36px; border-radius:9px; background:var(--text); display:flex; align-items:center; justify-content:center; }
    .brand h1 { font-size:18px; font-weight:600; letter-spacing:-0.3px; }
    .brand p  { font-size:12px; color:var(--text3); margin-top:1px; }
    .db-pill { display:inline-flex; align-items:center; gap:8px; padding:6px 12px; background:var(--bg); border:1px solid var(--border); border-radius:20px; font-size:12px; color:var(--text2); white-space:nowrap; }
    .db-pill .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .dot-on  { background:#3B6D11; }
    .dot-off { background:var(--text3); }
    .db-pill strong { color:var(--text); font-weight:600; }
    .card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem 1.5rem; margin-bottom:1rem; }
    .search-row { display:flex; gap:10px; }
    .search-input { flex:1; padding:11px 16px; border:1px solid var(--border2); border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:15px; background:var(--bg2); color:var(--text); outline:none; transition:border-color .15s; }
    .search-input:focus { border-color:var(--text3); }
    .search-input::placeholder { color:var(--text3); }
    .btn { padding:11px 22px; border:none; border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; white-space:nowrap; transition:opacity .15s,background .15s; }
    .btn-primary { background:var(--text); color:var(--bg); }
    .btn-primary:hover { opacity:.85; }
    .btn-secondary { background:var(--bg2); color:var(--text); border:1px solid var(--border2); padding:9px 16px; font-size:13px; }
    .btn-secondary:hover { background:var(--bg3); }
    .hint { font-size:12px; color:var(--text3); margin-top:9px; }
    .results-area { min-height:80px; margin-bottom:1rem; }
    .result-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem 1.5rem; }
    .result-empty { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:2rem; text-align:center; color:var(--text2); }
    .result-empty p { font-size:14px; }
    .result-empty small { display:block; margin-top:6px; font-size:13px; color:var(--text3); }
    .result-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
    .result-header h2 { font-size:15px; font-weight:500; }
    .badge { font-size:12px; font-weight:500; padding:3px 11px; border-radius:20px; background:var(--blue-bg); color:var(--blue-tx); }
    .section-head { display:flex; align-items:center; gap:7px; font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text3); margin:16px 0 9px; }
    .s-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .s-green { background:#3B6D11; }
    .s-amber { background:#BA7517; }
    .kw-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { display:inline-flex; align-items:center; gap:6px; font-size:13px; padding:5px 12px; border-radius:20px; border:1px solid transparent; line-height:1.4; }
    .chip-close { background:var(--green-bg); border-color:var(--green-bd); color:var(--green-tx); }
    .chip-rel   { background:var(--amber-bg); border-color:var(--amber-bd); color:var(--amber-tx); }
    .chip-cat   { font-size:10px; font-family:'DM Mono',monospace; opacity:.65; }
    .divider { height:1px; background:var(--border); margin:1.75rem 0; }
    .upload-section h3 { font-size:14px; font-weight:600; margin-bottom:5px; }
    .upload-section p  { font-size:13px; color:var(--text2); margin-bottom:14px; line-height:1.65; }
    .upload-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .file-label { display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border:1px solid var(--border2); border-radius:var(--radius-sm); font-size:13px; cursor:pointer; background:var(--bg2); color:var(--text); transition:background .15s; white-space:nowrap; }
    .file-label:hover { background:var(--bg3); }
    #fileInput { display:none; }
    .file-name { font-size:13px; color:var(--text3); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .status-msg { font-size:13px; margin-top:10px; padding:9px 13px; border-radius:var(--radius-sm); line-height:1.5; }
    .status-ok   { background:var(--success-bg); color:var(--success-tx); }
    .status-err  { background:var(--danger-bg);  color:var(--danger-tx); }
    .status-info { background:var(--info-bg);    color:var(--info-tx); }
    .sheets-preview { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .sheet-tag { font-size:11px; font-family:'DM Mono',monospace; padding:3px 9px; border-radius:5px; background:var(--bg2); border:1px solid var(--border); color:var(--text3); }
    footer { text-align:center; margin-top:3rem; font-size:12px; color:var(--text3); }
    @media (max-width:540px) {
      body { padding:1rem .75rem 3rem; }
      .search-row { flex-direction:column; }
      .btn-primary { width:100%; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <path d="M4 5h12M4 10h8M4 15h10" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>Maths Keyword Matcher</h1>
        <p>Search maths topics · find matching keywords</p>
      </div>
    </div>
    <div class="db-pill">
      <span class="dot dot-off" id="dbDot"></span>
      <span id="dbPillText">No database loaded</span>
    </div>
  </div>

  <div class="card">
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text"
        placeholder="e.g. Rational Numbers, Compound Interest, Triangles…" autocomplete="off" />
      <button class="btn btn-primary" onclick="doSearch()">Search</button>
    </div>
    <p class="hint">Press Enter to search &nbsp;·&nbsp; results split into closely related and related</p>
  </div>

  <div class="results-area" id="results">
    <div class="result-empty"><p>Enter a topic above to find matching keywords</p></div>
  </div>

  <div class="divider"></div>

  <div class="upload-section">
    <h3>Upload keyword database</h3>
    <div class="upload-row">
      <label class="file-label" for="fileInput">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 1v9M4 5l4-4 4 4M2 12h12v2H2z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Choose Excel file
      </label>
      <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="onFileChosen(this)" />
      <span class="file-name" id="fileName">No file chosen</span>
      <button class="btn btn-secondary" id="btnSave" onclick="loadFile()" style="display:none">Save to database</button>
    </div>
    <div id="uploadStatus"></div>
    <div class="sheets-preview" id="sheetsPreview"></div>
  </div>

  <!--<footer>Maths Keyword Matcher &nbsp;·&nbsp; Data stored in your browser only &nbsp;·&nbsp; Nothing sent to any server</footer>-->
</div>

<script>
var SK = 'maths_kw_db';
var MK = 'maths_kw_meta';
var DB = [];
var selectedFile = null;

function init() {
  try {
    var saved = localStorage.getItem(SK);
    var meta  = localStorage.getItem(MK);
    if (saved) {
      DB = JSON.parse(saved);
      var m = meta ? JSON.parse(meta) : {};
      setPill(true, DB.length, m.sheets || []);
    } else {
      setPill(false, 0, []);
    }
  } catch(e) { setPill(false, 0, []); }
}

function setPill(loaded, count, sheets) {
  document.getElementById('dbDot').className = 'dot ' + (loaded ? 'dot-on' : 'dot-off');
  var txt = document.getElementById('dbPillText');
  if (loaded) {
    txt.innerHTML = '<strong>' + count + '</strong> keywords · ' + sheets.length + ' sheet' + (sheets.length !== 1 ? 's' : '');
  } else {
    txt.textContent = 'No database loaded';
  }
}

function norm(s) {
  return s.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
}

function scoreMatch(topic, kw) {
  var t = norm(topic);
  var k = norm(kw);
  if (k === t) return 3;
  if (k.indexOf(t) !== -1 || t.indexOf(k) !== -1) return 2;
  var tw  = t.split(' ').filter(function(w){ return w.length > 3; });
  var kw2 = k.split(' ').filter(function(w){ return w.length > 3; });
  var sh  = tw.filter(function(w){ return kw2.indexOf(w) !== -1; });
  if (sh.length >= 2) return 2;
  if (sh.length === 1) return 1;
  var tw2 = t.split(' ').filter(function(w){ return w.length > 2; });
  var kw3 = k.split(' ').filter(function(w){ return w.length > 2; });
  var sh2 = tw2.filter(function(w){
    return kw3.some(function(x){ return x.indexOf(w) !== -1 || w.indexOf(x) !== -1; });
  });
  if (sh2.length >= 1) return 1;
  return 0;
}

function doSearch() {
  var topic = document.getElementById('searchInput').value.trim();
  if (!topic) { showResult('<div class="result-empty"><p>Please enter a topic to search</p></div>'); return; }
  if (!DB.length) { showResult('<div class="result-empty"><p>No database loaded. Upload your Excel file below first.</p></div>'); return; }

  var closely = [], related = [];
  DB.forEach(function(item) {
    var s = scoreMatch(topic, item.kw);
    if (s >= 2) closely.push(item);
    else if (s === 1) related.push(item);
  });

  var total = closely.length + related.length;
  if (total === 0) {
    showResult('<div class="result-empty"><p>No keywords found for <strong>"' + esc(topic) + '"</strong></p><small>Try a simpler term — e.g. "triangle" instead of "isosceles triangle properties"</small></div>');
    return;
  }

  var html = '<div class="result-card"><div class="result-header"><h2>Results for "<strong>' + esc(topic) + '</strong>"</h2><span class="badge">' + total + ' keyword' + (total !== 1 ? 's' : '') + '</span></div>';
  if (closely.length) {
    html += '<div class="section-head"><span class="s-dot s-green"></span>Closely related — ' + closely.length + '</div><div class="kw-grid">';
    closely.forEach(function(item) {
      html += '<span class="chip chip-close">' + esc(item.kw) + (item.cat ? '<span class="chip-cat">' + esc(item.cat) + '</span>' : '') + '</span>';
    });
    html += '</div>';
  }
  if (related.length) {
    html += '<div class="section-head"><span class="s-dot s-amber"></span>Related — ' + related.length + '</div><div class="kw-grid">';
    related.forEach(function(item) {
      html += '<span class="chip chip-rel">' + esc(item.kw) + (item.cat ? '<span class="chip-cat">' + esc(item.cat) + '</span>' : '') + '</span>';
    });
    html += '</div>';
  }
  html += '</div>';
  showResult(html);
}

function showResult(html) { document.getElementById('results').innerHTML = html; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
document.getElementById('searchInput').addEventListener('keydown', function(e){ if(e.key==='Enter') doSearch(); });

function onFileChosen(input) {
  if (!input.files.length) return;
  selectedFile = input.files[0];
  document.getElementById('fileName').textContent = selectedFile.name;
  document.getElementById('btnSave').style.display = 'inline-block';
  document.getElementById('uploadStatus').innerHTML = '';
  document.getElementById('sheetsPreview').innerHTML = '';
}

function loadFile() {
  if (!selectedFile) return;
  var statusEl = document.getElementById('uploadStatus');
  //statusEl.innerHTML = '<p class="status-msg status-info">Reading file…</p>';

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb      = XLSX.read(e.target.result, { type: 'array' });
      var allKws  = [];
      var sheetsSeen = [];

      for (var si = 0; si < wb.SheetNames.length; si++) {
        var sheetName = wb.SheetNames[si];
        var nl        = sheetName.trim().toLowerCase();

        /* skip summary */
        if (nl === 'summary') continue;

        var ws   = wb.Sheets[sheetName];
        /* raw 2-D array, empty cells become empty string */
        var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

        if (nl === 'sheet1') {
          /*
            Sheet1:
              row 0  → "Maths Topics"  (header, skip)
              row 1+ → keyword in col A (index 0)
          */
          var count = 0;
          for (var i = 1; i < rows.length; i++) {
            var row  = rows[i];
            if (!Array.isArray(row)) continue;
            var cell = row[0];
            if (cell === null || cell === undefined) continue;
            var kw = String(cell).trim();
            if (kw.length > 2) { allKws.push({ kw: kw, cat: '' }); count++; }
          }
          if (count > 0) sheetsSeen.push({ name: 'Sheet1 (full list)', count: count });

        } else {
          /*
            Category sheet (e.g. "Algebra"):
              row 0 → category name in col A         (skip)
              row 1 → "#" | "Keyword / Topic Title" | "Priority"  (header, skip)
              row 2+ → number | keyword | "High Volume"
                        col A (index 0) = serial number
                        col B (index 1) = keyword text  ← we want this
          */
          var catName = sheetName.trim();
          var count2  = 0;
          for (var j = 2; j < rows.length; j++) {
            var r = rows[j];
            if (!Array.isArray(r)) continue;
            var raw = r[1];   /* col B */
            if (raw === null || raw === undefined) continue;
            var kw2 = String(raw).trim();
            /* skip blank, pure numbers, or the column header text itself */
            if (kw2.length > 2 && isNaN(Number(kw2)) && kw2.toLowerCase() !== 'keyword / topic title') {
              allKws.push({ kw: kw2, cat: catName });
              count2++;
            }
          }
          if (count2 > 0) sheetsSeen.push({ name: catName, count: count2 });
        }
      }

      if (!allKws.length) {
        statusEl.innerHTML = '<p class="status-msg status-err">No keywords found. Check that Sheet1 has keywords in column A (rows 2+) and category sheets have keywords in column B (rows 3+).</p>';
        return;
      }

      /* deduplicate — keep first occurrence */
      var seen   = {};
      var unique = [];
      for (var k = 0; k < allKws.length; k++) {
        var key = allKws[k].kw.toLowerCase();
        if (!seen[key]) { seen[key] = true; unique.push(allKws[k]); }
      }

      var now = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
      localStorage.setItem(SK, JSON.stringify(unique));
      localStorage.setItem(MK, JSON.stringify({ filename: selectedFile.name, savedAt: now, count: unique.length, sheets: sheetsSeen }));

      DB = unique;
      setPill(true, DB.length, sheetsSeen);

      /*statusEl.innerHTML = '<p class="status-msg status-ok">✓ ' + DB.length + ' keywords saved from ' + sheetsSeen.length + ' sheet' + (sheetsSeen.length !== 1 ? 's' : '') + '. Loads automatically every visit — no need to upload again.</p>';*/
      statusEl.innerHTML = '<p class="status-msg status-ok">✓ ' + DB.length + ' keywords saved successfully.</p>';
      setTimeout(function(){ statusEl.innerHTML = ''; }, 3000);
      var preview = document.getElementById('sheetsPreview');
      /*preview.innerHTML = sheetsSeen.map(function(s){ return '<span class="sheet-tag">' + esc(s.name) + ' · ' + s.count + '</span>'; }).join('');*/

      showResult('<div class="result-empty"><p>Database ready. Enter a topic above to search.</p></div>');

    } catch(err) {
      statusEl.innerHTML = '<p class="status-msg status-err">Error reading file: ' + esc(err.message) + '</p>';
    }
  };
  reader.readAsArrayBuffer(selectedFile);
}

init();
</script>
</body>
</html>
